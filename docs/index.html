<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>A股打板监控系统 - 实时分析</title>
    <style>
        :root {
            --bg-primary: #0a0e27;
            --bg-secondary: #1a1f3c;
            --bg-card: rgba(30, 35, 70, 0.8);
            --text-primary: #ffffff;
            --text-secondary: #a0a8c0;
            --accent-green: #00d26a;
            --accent-red: #ff4757;
            --accent-gold: #ffd700;
            --accent-blue: #3498db;
            --border-color: rgba(255, 255, 255, 0.1);
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
        }
        .bg-animation {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: -1;
            background: linear-gradient(135deg, var(--bg-primary) 0%, #1a1a2e 50%, var(--bg-primary) 100%);
        }
        header {
            padding: 20px 30px;
            background: var(--bg-secondary);
            border-bottom: 1px solid var(--border-color);
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 100;
        }
        .logo { display: flex; align-items: center; gap: 12px; }
        .logo-icon {
            width: 40px; height: 40px;
            background: linear-gradient(135deg, var(--accent-gold), #ff8c00);
            border-radius: 10px;
            display: flex; align-items: center; justify-content: center;
            font-size: 20px;
        }
        .logo h1 {
            font-size: 20px; font-weight: 600;
            background: linear-gradient(135deg, #fff, #a0a8c0);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }
        .status { display: flex; align-items: center; gap: 20px; }
        .market-status {
            display: flex; align-items: center; gap: 8px;
            padding: 8px 16px;
            background: var(--bg-card);
            border-radius: 20px;
            font-size: 14px;
        }
        .status-dot {
            width: 8px; height: 8px;
            border-radius: 50%;
            background: var(--accent-green);
            animation: pulse 2s infinite;
        }
        .status-dot.closed { background: var(--accent-red); animation: none; }
        @keyframes pulse {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.5; transform: scale(1.2); }
        }
        .update-time { color: var(--text-secondary); font-size: 12px; }
        .refresh-btn {
            padding: 8px 16px;
            background: linear-gradient(135deg, var(--accent-blue), #2980b9);
            border: none; border-radius: 20px;
            color: #fff; font-size: 13px; cursor: pointer;
            transition: all 0.3s;
        }
        .refresh-btn:hover { transform: scale(1.05); opacity: 0.9; }
        .refresh-btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
        .countdown { color: var(--text-secondary); font-size: 12px; min-width: 80px; text-align: right; }
        .container { max-width: 1400px; margin: 0 auto; padding: 30px; }
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        .stat-card {
            background: var(--bg-card);
            border-radius: 16px;
            padding: 24px;
            border: 1px solid var(--border-color);
            transition: all 0.3s ease;
        }
        .stat-card:hover { transform: translateY(-5px); border-color: var(--accent-blue); }
        .stat-label { color: var(--text-secondary); font-size: 14px; margin-bottom: 8px; }
        .stat-value { font-size: 32px; font-weight: 700; }
        .stat-value.up { color: var(--accent-red); }
        .stat-value.down { color: var(--accent-green); }
        .stat-value.sentiment { color: var(--accent-gold); }
        .sentiment-card {
            background: linear-gradient(135deg, var(--bg-card), rgba(255, 215, 0, 0.1));
            border: 1px solid rgba(255, 215, 0, 0.3);
        }
        .indices-section { margin-bottom: 30px; }
        .section-title { font-size: 18px; font-weight: 600; margin-bottom: 16px; display: flex; align-items: center; gap: 10px; }
        .indices-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 16px; }
        .index-card {
            background: var(--bg-card);
            border-radius: 12px;
            padding: 20px;
            border: 1px solid var(--border-color);
            display: flex; justify-content: space-between; align-items: center;
        }
        .index-name { font-size: 16px; color: var(--text-secondary); margin-bottom: 4px; }
        .index-price { font-size: 24px; font-weight: 600; }
        .index-change {
            font-size: 18px; font-weight: 600;
            padding: 6px 12px; border-radius: 8px;
        }
        .index-change.up { background: rgba(255, 71, 87, 0.2); color: var(--accent-red); }
        .index-change.down { background: rgba(0, 210, 106, 0.2); color: var(--accent-green); }
        .main-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 24px; }
        @media (max-width: 900px) { .main-grid { grid-template-columns: 1fr; } }
        .panel { background: var(--bg-card); border-radius: 16px; border: 1px solid var(--border-color); overflow: hidden; }
        .panel-header {
            padding: 20px 24px;
            border-bottom: 1px solid var(--border-color);
            display: flex; justify-content: space-between; align-items: center;
        }
        .panel-title { font-size: 16px; font-weight: 600; display: flex; align-items: center; gap: 8px; }
        .panel-body { padding: 16px 24px; }
        .sector-item {
            display: flex; align-items: center;
            padding: 16px 0;
            border-bottom: 1px solid var(--border-color);
        }
        .sector-item:last-child { border-bottom: none; }
        .sector-item:hover { background: rgba(255, 255, 255, 0.02); padding-left: 10px; }
        .sector-rank {
            width: 28px; height: 28px;
            background: var(--bg-secondary);
            border-radius: 8px;
            display: flex; align-items: center; justify-content: center;
            font-size: 14px; font-weight: 600;
            margin-right: 16px;
        }
        .sector-rank.top1 { background: linear-gradient(135deg, #ffd700, #ff8c00); color: #000; }
        .sector-rank.top2 { background: linear-gradient(135deg, #c0c0c0, #a0a0a0); color: #000; }
        .sector-rank.top3 { background: linear-gradient(135deg, #cd7f32, #a0522d); color: #fff; }
        .sector-info { flex: 1; }
        .sector-name { font-size: 15px; font-weight: 500; margin-bottom: 4px; }
        .sector-meta { font-size: 12px; color: var(--text-secondary); }
        .stock-item {
            display: flex; align-items: center;
            padding: 14px 0;
            border-bottom: 1px solid var(--border-color);
        }
        .stock-item:last-child { border-bottom: none; }
        .stock-rank {
            width: 24px; height: 24px;
            border-radius: 6px;
            display: flex; align-items: center; justify-content: center;
            font-size: 12px; font-weight: 600;
            margin-right: 16px;
            background: var(--bg-secondary);
        }
        .stock-rank.top1 { background: linear-gradient(135deg, #ffd700, #ff8c00); color: #000; }
        .stock-rank.top2 { background: linear-gradient(135deg, #c0c0c0, #a0a0a0); color: #000; }
        .stock-rank.top3 { background: linear-gradient(135deg, #cd7f32, #a0522d); color: #fff; }
        .stock-info { flex: 1; }
        .stock-name { font-size: 14px; font-weight: 500; }
        .stock-code { font-size: 12px; color: var(--text-secondary); }
        .stock-data { text-align: right; }
        .stock-change { font-size: 14px; font-weight: 600; color: var(--accent-red); }
        .stock-amount { font-size: 12px; color: var(--text-secondary); }
        .opportunities-section { margin-top: 30px; }
        .opportunity-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 16px; }
        .opportunity-card {
            background: linear-gradient(135deg, var(--bg-card), rgba(255, 71, 87, 0.1));
            border: 1px solid rgba(255, 71, 87, 0.3);
            border-radius: 12px;
            padding: 20px;
        }
        .opportunity-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 12px; }
        .opportunity-name { font-size: 18px; font-weight: 600; }
        .opportunity-level { padding: 4px 10px; background: rgba(255, 71, 87, 0.2); border-radius: 12px; font-size: 12px; }
        .opportunity-code { font-size: 14px; color: var(--text-secondary); margin-bottom: 12px; }
        .opportunity-action { font-size: 14px; color: var(--accent-green); margin-bottom: 8px; }
        .opportunity-risk { font-size: 12px; color: var(--text-secondary); }
        @media (max-width: 600px) {
            header { flex-direction: column; gap: 16px; }
            .container { padding: 16px; }
            .stats-grid { grid-template-columns: repeat(2, 1fr); }
            .stat-value { font-size: 24px; }
        }
    </style>
</head>
<body>
    <div class="bg-animation"></div>
    <header>
        <div class="logo">
            <div class="logo-icon">📈</div>
            <h1>A股打板监控系统</h1>
        </div>
        <div class="status">
            <div class="market-status">
                <div class="status-dot" id="statusDot"></div>
                <span id="marketStatus">数据加载中...</span>
            </div>
            <span class="update-time" id="updateTime">--</span>
            <button class="refresh-btn" id="refreshBtn" onclick="manualRefresh()">🔄 刷新</button>
            <span class="countdown" id="countdown"></span>
        </div>
    </header>

    <div class="container">
        <div class="stats-grid">
            <div class="stat-card">
                <div class="stat-label">涨停家数</div>
                <div class="stat-value up" id="limitUpCount">--</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">跌停家数</div>
                <div class="stat-value down" id="limitDownCount">--</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">涨跌停比</div>
                <div class="stat-value" id="upDownRatio">--</div>
            </div>
            <div class="stat-card sentiment-card">
                <div class="stat-label">市场情绪</div>
                <div class="stat-value sentiment" id="sentiment">--</div>
            </div>
        </div>

        <div class="indices-section">
            <div class="section-title">📊 大盘指数</div>
            <div class="indices-grid" id="indicesGrid"></div>
        </div>

        <div class="main-grid">
            <div class="panel">
                <div class="panel-header">
                    <div class="panel-title">🔥 热点板块</div>
                    <span style="color: var(--text-secondary); font-size: 12px;">按涨停数排序</span>
                </div>
                <div class="panel-body" id="sectorsPanel"></div>
            </div>
            <div class="panel">
                <div class="panel-header">
                    <div class="panel-title">🐉 龙头股</div>
                    <span style="color: var(--text-secondary); font-size: 12px;">按成交额排序</span>
                </div>
                <div class="panel-body" id="dragonsPanel"></div>
            </div>
        </div>

        <div class="opportunities-section">
            <div class="section-title">💡 今日重点机会</div>
            <div class="opportunity-grid" id="opportunitiesPanel"></div>
        </div>
    </div>

    <script>
        const API_BASE = 'data/';
        let countdownTimer = null;
        let autoRefreshSec = 300; // 5分钟自动刷新

        // 强制绕过缓存加载数据
        async function loadData(showLoading = false) {
            if (showLoading) {
                document.getElementById('marketStatus').textContent = '数据加载中...';
                document.getElementById('refreshBtn').disabled = true;
                document.getElementById('refreshBtn').textContent = '⏳ 加载中';
            }
            try {
                const ts = Date.now();
                const response = await fetch(`${API_BASE}realtime.json?_t=${ts}&_r=${Math.random()}`, {
                    method: 'GET',
                    cache: 'no-store',           // 彻底禁用缓存
                    headers: {
                        'Cache-Control': 'no-cache, no-store, must-revalidate',
                        'Pragma': 'no-cache',
                        'Expires': '0'
                    }
                });
                if (!response.ok) throw new Error('HTTP ' + response.status);
                const data = await response.json();
                renderData(data);
                resetCountdown();
            } catch (error) {
                console.warn('加载真实数据失败，使用演示数据:', error);
                renderMockData();
            } finally {
                document.getElementById('refreshBtn').disabled = false;
                document.getElementById('refreshBtn').textContent = '🔄 刷新';
            }
        }

        function manualRefresh() {
            loadData(true);
        }

        function resetCountdown() {
            clearInterval(countdownTimer);
            let remaining = autoRefreshSec;
            updateCountdownDisplay(remaining);
            countdownTimer = setInterval(() => {
                remaining--;
                updateCountdownDisplay(remaining);
                if (remaining <= 0) {
                    loadData(false);
                    remaining = autoRefreshSec;
                }
            }, 1000);
        }

        function updateCountdownDisplay(sec) {
            const el = document.getElementById('countdown');
            if (!el) return;
            if (sec > 60) {
                el.textContent = `${Math.floor(sec/60)}分后刷新`;
            } else {
                el.textContent = `${sec}秒后刷新`;
            }
        }

        function renderData(data) {
            // 更新时间
            document.getElementById('updateTime').textContent = '更新: ' + (data.update_time || '--');

            // 市场状态
            const isOpen = data.market_status === '盘中';
            document.getElementById('statusDot').className = isOpen ? 'status-dot' : 'status-dot closed';
            document.getElementById('marketStatus').textContent = data.market_status || '未知';

            // 统计
            document.getElementById('limitUpCount').textContent = data.limit_up_count || 0;
            document.getElementById('limitDownCount').textContent = data.limit_down_count || 0;
            
            const upCount = data.limit_up_count || 0;
            const downCount = data.limit_down_count || 1;
            document.getElementById('upDownRatio').textContent = (upCount / downCount).toFixed(1);
            
            document.getElementById('sentiment').textContent = data.sentiment || '--';

            // 指数
            renderIndices(data.indices || []);
            // 板块
            renderSectors(data.hot_sectors || []);
            // 龙头
            renderDragons(data.dragon_stocks || []);
            // 机会
            renderOpportunities(data.opportunities || []);
        }

        function renderIndices(indices) {
            const grid = document.getElementById('indicesGrid');
            if (!indices || indices.length === 0) {
                grid.innerHTML = '<div style="color: var(--text-secondary)">暂无数据</div>';
                return;
            }
            let html = '';
            indices.forEach(idx => {
                const isUp = (idx.change || 0) >= 0;
                html += `
                    <div class="index-card">
                        <div>
                            <div class="index-name">${idx.name || '--'}</div>
                            <div class="index-price">${idx.price || '--'}</div>
                        </div>
                        <div class="index-change ${isUp ? 'up' : 'down'}">
                            ${isUp ? '+' : ''}${(idx.change || 0).toFixed(2)}%
                        </div>
                    </div>
                `;
            });
            grid.innerHTML = html;
        }

        function renderSectors(sectors) {
            const panel = document.getElementById('sectorsPanel');
            if (!sectors || sectors.length === 0) {
                panel.innerHTML = '<div style="color: var(--text-secondary)">暂无板块数据</div>';
                return;
            }
            let html = '';
            sectors.slice(0, 5).forEach((sector, i) => {
                const rankClass = i < 3 ? `top${i+1}` : '';
                html += `
                    <div class="sector-item">
                        <div class="sector-rank ${rankClass}">${i + 1}</div>
                        <div class="sector-info">
                            <div class="sector-name">${sector.name || '--'}</div>
                            <div class="sector-meta">${sector.count || 0}只涨停 | 成交 ${sector.total_amount || '--'}</div>
                        </div>
                    </div>
                `;
            });
            panel.innerHTML = html;
        }

        function renderDragons(stocks) {
            const panel = document.getElementById('dragonsPanel');
            if (!stocks || stocks.length === 0) {
                panel.innerHTML = '<div style="color: var(--text-secondary)">暂无龙头数据</div>';
                return;
            }
            let html = '';
            stocks.slice(0, 10).forEach((stock, i) => {
                const rankClass = i < 3 ? `top${i+1}` : '';
                html += `
                    <div class="stock-item">
                        <div class="stock-rank ${rankClass}">${i + 1}</div>
                        <div class="stock-info">
                            <div class="stock-name">${stock.name || '--'}</div>
                            <div class="stock-code">${stock.code || '--'}</div>
                        </div>
                        <div class="stock-data">
                            <div class="stock-change">${stock.change || '--'}</div>
                            <div class="stock-amount">${stock.amount || '--'}</div>
                        </div>
                    </div>
                `;
            });
            panel.innerHTML = html;
        }

        function renderOpportunities(opportunities) {
            const panel = document.getElementById('opportunitiesPanel');
            if (!opportunities || opportunities.length === 0) {
                panel.innerHTML = '<div style="color: var(--text-secondary)">暂无机会推荐</div>';
                return;
            }
            let html = '';
            opportunities.forEach(opp => {
                const riskLevel = opp.risk === '高' ? '🔴' : opp.risk === '中' ? '🟠' : '🟢';
                html += `
                    <div class="opportunity-card">
                        <div class="opportunity-header">
                            <div class="opportunity-name">${opp.name || '--'}</div>
                            <div class="opportunity-level">${riskLevel} ${opp.risk || '--'}</div>
                        </div>
                        <div class="opportunity-code">${opp.stock || opp.code || '--'}</div>
                        <div class="opportunity-action">💡 ${opp.entry || '--'}</div>
                        <div class="opportunity-risk">📈 潜在收益: ${opp.potential || '--'}</div>
                    </div>
                `;
            });
            panel.innerHTML = html;
        }

        // 默认演示数据（网络错误时展示）
        function renderMockData() {
            document.getElementById('updateTime').textContent = '⚠️ 演示数据（网络不可达）';
            document.getElementById('marketStatus').textContent = '离线';
            document.getElementById('statusDot').className = 'status-dot closed';
            document.getElementById('limitUpCount').textContent = '36';
            document.getElementById('limitDownCount').textContent = '8';
            document.getElementById('upDownRatio').textContent = '4.5';
            document.getElementById('sentiment').textContent = '偏强';
            document.getElementById('indicesGrid').innerHTML = `
                <div class="index-card"><div><div class="index-name">上证指数</div><div class="index-price">3068.56</div></div><div class="index-change up">+0.82%</div></div>
                <div class="index-card"><div><div class="index-name">深证成指</div><div class="index-price">9856.23</div></div><div class="index-change up">+1.15%</div></div>
                <div class="index-card"><div><div class="index-name">创业板指</div><div class="index-price">1988.45</div></div><div class="index-change down">-0.36%</div></div>
            `;
            document.getElementById('sectorsPanel').innerHTML = `
                <div class="sector-item"><div class="sector-rank top1">1</div><div class="sector-info"><div class="sector-name">AI/人工智能</div><div class="sector-meta">8只涨停 | 成交 23.5亿</div></div></div>
                <div class="sector-item"><div class="sector-rank top2">2</div><div class="sector-info"><div class="sector-name">医药</div><div class="sector-meta">6只涨停 | 成交 18.2亿</div></div></div>
                <div class="sector-item"><div class="sector-rank top3">3</div><div class="sector-info"><div class="sector-name">数字经济</div><div class="sector-meta">5只涨停 | 成交 12.8亿</div></div></div>
            `;
            document.getElementById('dragonsPanel').innerHTML = `
                <div class="stock-item"><div class="stock-rank top1">1</div><div class="stock-info"><div class="stock-name">津药药业</div><div class="stock-code">600488</div></div><div class="stock-data"><div class="stock-change">+10.08%</div><div class="stock-amount">8.52亿</div></div></div>
                <div class="stock-item"><div class="stock-rank top2">2</div><div class="stock-info"><div class="stock-name">新能泰山</div><div class="stock-code">000720</div></div><div class="stock-data"><div class="stock-change">+10.05%</div><div class="stock-amount">6.31亿</div></div></div>
            `;
            document.getElementById('opportunitiesPanel').innerHTML = `
                <div class="opportunity-card"><div class="opportunity-header"><div class="opportunity-name">龙回头机会</div><div class="opportunity-level">🟠 中</div></div><div class="opportunity-code">新能泰山 000720</div><div class="opportunity-action">💡 回踩5日线介入</div><div class="opportunity-risk">📈 潜在收益: 8-12%</div></div>
            `;
        }

        // 页面加载完成后立即拉取数据
        document.addEventListener('DOMContentLoaded', () => loadData(true));
    </script>
</body>
</html>
