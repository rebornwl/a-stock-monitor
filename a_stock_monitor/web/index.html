<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>A股打板监控系统 - 实时分析</title>
    <style>
        :root {
            --bg-primary: #0a0e27;
            --bg-secondary: #1a1f3c;
            --bg-card: rgba(30, 35, 70, 0.8);
            --text-primary: #ffffff;
            --text-secondary: #a0a8c0;
            --accent-green: #00d26a;
            --accent-red: #ff4757;
            --accent-gold: #ffd700;
            --accent-blue: #3498db;
            --border-color: rgba(255, 255, 255, 0.1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* 背景动画 */
        .bg-animation {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            background: linear-gradient(135deg, var(--bg-primary) 0%, #1a1a2e 50%, var(--bg-primary) 100%);
        }

        .bg-animation::before {
            content: '';
            position: absolute;
            width: 200%;
            height: 200%;
            top: -50%;
            left: -50%;
            background: radial-gradient(circle at 20% 80%, rgba(52, 152, 219, 0.1) 0%, transparent 50%),
                        radial-gradient(circle at 80% 20%, rgba(255, 71, 87, 0.1) 0%, transparent 50%);
            animation: float 20s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translate(0, 0) rotate(0deg); }
            50% { transform: translate(-5%, 5%) rotate(5deg); }
        }

        /* 头部 */
        header {
            padding: 20px 30px;
            background: var(--bg-secondary);
            border-bottom: 1px solid var(--border-color);
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 100;
            backdrop-filter: blur(20px);
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .logo-icon {
            width: 40px;
            height: 40px;
            background: linear-gradient(135deg, var(--accent-gold), #ff8c00);
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
        }

        .logo h1 {
            font-size: 20px;
            font-weight: 600;
            background: linear-gradient(135deg, #fff, #a0a8c0);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .status {
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .market-status {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 8px 16px;
            background: var(--bg-card);
            border-radius: 20px;
            font-size: 14px;
        }

        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--accent-green);
            animation: pulse 2s infinite;
        }

        .status-dot.closed {
            background: var(--accent-red);
            animation: none;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.5; transform: scale(1.2); }
        }

        .update-time {
            color: var(--text-secondary);
            font-size: 12px;
        }

        /* 主容器 */
        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 30px;
        }

        /* 统计卡片 */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .stat-card {
            background: var(--bg-card);
            border-radius: 16px;
            padding: 24px;
            border: 1px solid var(--border-color);
            transition: all 0.3s ease;
        }

        .stat-card:hover {
            transform: translateY(-5px);
            border-color: var(--accent-blue);
            box-shadow: 0 10px 40px rgba(52, 152, 219, 0.2);
        }

        .stat-label {
            color: var(--text-secondary);
            font-size: 14px;
            margin-bottom: 8px;
        }

        .stat-value {
            font-size: 32px;
            font-weight: 700;
        }

        .stat-value.up { color: var(--accent-red); }
        .stat-value.down { color: var(--accent-green); }
        .stat-value.sentiment { color: var(--accent-gold); }

        /* 市场情绪 */
        .sentiment-card {
            background: linear-gradient(135deg, var(--bg-card), rgba(255, 215, 0, 0.1));
            border: 1px solid rgba(255, 215, 0, 0.3);
        }

        /* 指数卡片 */
        .indices-section {
            margin-bottom: 30px;
        }

        .section-title {
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 16px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .indices-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 16px;
        }

        .index-card {
            background: var(--bg-card);
            border-radius: 12px;
            padding: 20px;
            border: 1px solid var(--border-color);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .index-name {
            font-size: 16px;
            color: var(--text-secondary);
            margin-bottom: 4px;
        }

        .index-price {
            font-size: 24px;
            font-weight: 600;
        }

        .index-change {
            font-size: 18px;
            font-weight: 600;
            padding: 6px 12px;
            border-radius: 8px;
        }

        .index-change.up {
            background: rgba(255, 71, 87, 0.2);
            color: var(--accent-red);
        }

        .index-change.down {
            background: rgba(0, 210, 106, 0.2);
            color: var(--accent-green);
        }

        /* 板块和龙头 */
        .main-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 24px;
        }

        @media (max-width: 900px) {
            .main-grid {
                grid-template-columns: 1fr;
            }
        }

        .panel {
            background: var(--bg-card);
            border-radius: 16px;
            border: 1px solid var(--border-color);
            overflow: hidden;
        }

        .panel-header {
            padding: 20px 24px;
            border-bottom: 1px solid var(--border-color);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .panel-title {
            font-size: 16px;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .panel-body {
            padding: 16px 24px;
        }

        /* 板块列表 */
        .sector-item {
            display: flex;
            align-items: center;
            padding: 16px 0;
            border-bottom: 1px solid var(--border-color);
            transition: all 0.2s ease;
        }

        .sector-item:last-child {
            border-bottom: none;
        }

        .sector-item:hover {
            background: rgba(255, 255, 255, 0.02);
            padding-left: 10px;
        }

        .sector-rank {
            width: 28px;
            height: 28px;
            background: var(--bg-secondary);
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            font-weight: 600;
            margin-right: 16px;
        }

        .sector-rank.top1 { background: linear-gradient(135deg, #ffd700, #ff8c00); color: #000; }
        .sector-rank.top2 { background: linear-gradient(135deg, #c0c0c0, #a0a0a0); color: #000; }
        .sector-rank.top3 { background: linear-gradient(135deg, #cd7f32, #a0522d); color: #fff; }

        .sector-info {
            flex: 1;
        }

        .sector-name {
            font-size: 15px;
            font-weight: 500;
            margin-bottom: 4px;
        }

        .sector-meta {
            font-size: 12px;
            color: var(--text-secondary);
        }

        .sector-stocks {
            display: flex;
            gap: 8px;
        }

        .mini-stock {
            padding: 4px 10px;
            background: var(--bg-secondary);
            border-radius: 12px;
            font-size: 12px;
            color: var(--text-secondary);
            max-width: 80px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        /* 龙头股列表 */
        .stock-item {
            display: flex;
            align-items: center;
            padding: 14px 0;
            border-bottom: 1px solid var(--border-color);
        }

        .stock-item:last-child {
            border-bottom: none;
        }

        .stock-rank {
            width: 24px;
            height: 24px;
            border-radius: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            font-weight: 600;
            margin-right: 16px;
            background: var(--bg-secondary);
        }

        .stock-rank.top1 { background: linear-gradient(135deg, #ffd700, #ff8c00); color: #000; }
        .stock-rank.top2 { background: linear-gradient(135deg, #c0c0c0, #a0a0a0); color: #000; }
        .stock-rank.top3 { background: linear-gradient(135deg, #cd7f32, #a0522d); color: #fff; }

        .stock-info {
            flex: 1;
        }

        .stock-name {
            font-size: 14px;
            font-weight: 500;
        }

        .stock-code {
            font-size: 12px;
            color: var(--text-secondary);
        }

        .stock-data {
            text-align: right;
        }

        .stock-change {
            font-size: 14px;
            font-weight: 600;
            color: var(--accent-red);
        }

        .stock-amount {
            font-size: 12px;
            color: var(--text-secondary);
        }

        /* 机会卡片 */
        .opportunities-section {
            margin-top: 30px;
        }

        .opportunity-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 16px;
        }

        .opportunity-card {
            background: linear-gradient(135deg, var(--bg-card), rgba(255, 71, 87, 0.1));
            border: 1px solid rgba(255, 71, 87, 0.3);
            border-radius: 12px;
            padding: 20px;
        }

        .opportunity-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 12px;
        }

        .opportunity-name {
            font-size: 18px;
            font-weight: 600;
        }

        .opportunity-level {
            padding: 4px 10px;
            background: rgba(255, 71, 87, 0.2);
            border-radius: 12px;
            font-size: 12px;
        }

        .opportunity-code {
            font-size: 14px;
            color: var(--text-secondary);
            margin-bottom: 12px;
        }

        .opportunity-action {
            font-size: 14px;
            color: var(--accent-green);
            margin-bottom: 8px;
        }

        .opportunity-risk {
            font-size: 12px;
            color: var(--text-secondary);
        }

        /* 加载状态 */
        .loading {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 60px;
            color: var(--text-secondary);
        }

        .loading-spinner {
            width: 40px;
            height: 40px;
            border: 3px solid var(--border-color);
            border-top-color: var(--accent-blue);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-bottom: 16px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* 错误状态 */
        .error {
            text-align: center;
            padding: 60px;
            color: var(--accent-red);
        }

        .refresh-btn {
            margin-top: 20px;
            padding: 10px 24px;
            background: var(--accent-blue);
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.2s ease;
        }

        .refresh-btn:hover {
            background: #2980b9;
            transform: scale(1.05);
        }

        /* 响应式 */
        @media (max-width: 600px) {
            header {
                flex-direction: column;
                gap: 16px;
            }

            .container {
                padding: 16px;
            }

            .stats-grid {
                grid-template-columns: repeat(2, 1fr);
            }

            .stat-value {
                font-size: 24px;
            }
        }
    </style>
</head>
<body>
    <div class="bg-animation"></div>

    <header>
        <div class="logo">
            <div class="logo-icon">📈</div>
            <h1>A股打板监控系统</h1>
        </div>
        <div class="status">
            <div class="market-status">
                <div class="status-dot" id="statusDot"></div>
                <span id="marketStatus">数据加载中...</span>
            </div>
            <span class="update-time" id="updateTime">--</span>
        </div>
    </header>

    <div class="container">
        <!-- 统计卡片 -->
        <div class="stats-grid">
            <div class="stat-card">
                <div class="stat-label">涨停家数</div>
                <div class="stat-value up" id="limitUpCount">--</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">跌停家数</div>
                <div class="stat-value down" id="limitDownCount">--</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">涨跌停比</div>
                <div class="stat-value" id="upDownRatio">--</div>
            </div>
            <div class="stat-card sentiment-card">
                <div class="stat-label">市场情绪</div>
                <div class="stat-value sentiment" id="sentiment">--</div>
            </div>
        </div>

        <!-- 大盘指数 -->
        <div class="indices-section">
            <div class="section-title">📊 大盘指数</div>
            <div class="indices-grid" id="indicesGrid">
                <!-- 动态填充 -->
            </div>
        </div>

        <!-- 板块和龙头 -->
        <div class="main-grid">
            <!-- 热点板块 -->
            <div class="panel">
                <div class="panel-header">
                    <div class="panel-title">🔥 热点板块</div>
                    <span style="color: var(--text-secondary); font-size: 12px;">按涨停数排序</span>
                </div>
                <div class="panel-body" id="sectorsPanel">
                    <!-- 动态填充 -->
                </div>
            </div>

            <!-- 龙头股 -->
            <div class="panel">
                <div class="panel-header">
                    <div class="panel-title">🐉 龙头股</div>
                    <span style="color: var(--text-secondary); font-size: 12px;">按成交额排序</span>
                </div>
                <div class="panel-body" id="dragonsPanel">
                    <!-- 动态填充 -->
                </div>
            </div>
        </div>

        <!-- 投资机会 -->
        <div class="opportunities-section">
            <div class="section-title">💡 今日重点机会</div>
            <div class="opportunity-grid" id="opportunitiesPanel">
                <!-- 动态填充 -->
            </div>
        </div>
    </div>

    <script>
        // 配置
        const API_BASE = 'data/';  // 本地JSON文件目录
        const REFRESH_INTERVAL = 60000;  // 60秒刷新

        // 加载数据
        async function loadData() {
            try {
                const response = await fetch(`${API_BASE}realtime.json?t=${Date.now()}`);
                if (!response.ok) throw new Error('数据加载失败');
                const data = await response.json();
                renderData(data);
            } catch (error) {
                console.error('加载数据失败:', error);
                // 尝试使用模拟数据
                renderMockData();
            }
        }

        // 渲染数据
        function renderData(data) {
            const { market, indices, limit_up_count, limit_down_count, hot_sectors, dragon_stocks, recent_opportunities, timestamp } = data;

            // 更新时间
            const time = new Date(timestamp);
            document.getElementById('updateTime').textContent = `更新: ${time.toLocaleTimeString('zh-CN')}`;

            // 市场状态
            const isOpen = market.is_open;
            document.getElementById('statusDot').className = isOpen ? 'status-dot' : 'status-dot closed';
            document.getElementById('marketStatus').textContent = isOpen ? '交易中' : '已休市';

            // 统计
            document.getElementById('limitUpCount').textContent = limit_up_count;
            document.getElementById('limitDownCount').textContent = limit_down_count;
            document.getElementById('upDownRatio').textContent = market.sentiment.up_down_ratio;
            document.getElementById('sentiment').textContent = market.sentiment.sentiment;

            // 指数
            renderIndices(indices);

            // 板块
            renderSectors(hot_sectors);

            // 龙头
            renderDragons(dragon_stocks);

            // 机会
            renderOpportunities(recent_opportunities);
        }

        // 渲染指数
        function renderIndices(indices) {
            const grid = document.getElementById('indicesGrid');
            let html = '';

            for (const code in indices) {
                const idx = indices[code];
                const isUp = idx.change >= 0;
                html += `
                    <div class="index-card">
                        <div>
                            <div class="index-name">${idx.name}</div>
                            <div class="index-price">${idx.price}</div>
                        </div>
                        <div class="index-change ${isUp ? 'up' : 'down'}">
                            ${isUp ? '+' : ''}${idx.change.toFixed(2)}%
                        </div>
                    </div>
                `;
            }

            grid.innerHTML = html || '<div style="color: var(--text-secondary)">暂无数据</div>';
        }

        // 渲染板块
        function renderSectors(sectors) {
            const panel = document.getElementById('sectorsPanel');

            if (!sectors || sectors.length === 0) {
                panel.innerHTML = '<div style="color: var(--text-secondary)">暂无板块数据</div>';
                return;
            }

            let html = '';
            sectors.slice(0, 5).forEach((sector, i) => {
                const rankClass = i < 3 ? `top${i+1}` : '';
                html += `
                    <div class="sector-item">
                        <div class="sector-rank ${rankClass}">${i + 1}</div>
                        <div class="sector-info">
                            <div class="sector-name">${sector.name}</div>
                            <div class="sector-meta">${sector.count}只涨停 | 成交 ${sector.total_amount}</div>
                        </div>
                    </div>
                `;
            });

            panel.innerHTML = html;
        }

        // 渲染龙头股
        function renderDragons(stocks) {
            const panel = document.getElementById('dragonsPanel');

            if (!stocks || stocks.length === 0) {
                panel.innerHTML = '<div style="color: var(--text-secondary)">暂无龙头数据</div>';
                return;
            }

            let html = '';
            stocks.slice(0, 10).forEach((stock, i) => {
                const rankClass = i < 3 ? `top${i+1}` : '';
                html += `
                    <div class="stock-item">
                        <div class="stock-rank ${rankClass}">${i + 1}</div>
                        <div class="stock-info">
                            <div class="stock-name">${stock.name}</div>
                            <div class="stock-code">${stock.code}</div>
                        </div>
                        <div class="stock-data">
                            <div class="stock-change">${stock.change}</div>
                            <div class="stock-amount">${stock.amount}</div>
                        </div>
                    </div>
                `;
            });

            panel.innerHTML = html;
        }

        // 渲染机会
        function renderOpportunities(opportunities) {
            const panel = document.getElementById('opportunitiesPanel');

            if (!opportunities || opportunities.length === 0) {
                panel.innerHTML = '<div style="color: var(--text-secondary)">暂无机会推荐</div>';
                return;
            }

            let html = '';
            opportunities.forEach(opp => {
                html += `
                    <div class="opportunity-card">
                        <div class="opportunity-header">
                            <div class="opportunity-name">${opp.name}</div>
                            <div class="opportunity-level">${opp.level || '🟠'}</div>
                        </div>
                        <div class="opportunity-code">${opp.code}</div>
                        <div class="opportunity-action">💡 ${opp.action || '强势涨停'}</div>
                        <div class="opportunity-risk">⚠️ ${opp.risk || '注意风险'}</div>
                    </div>
                `;
            });

            panel.innerHTML = html;
        }

        // 模拟数据（用于开发/离线时展示）
        function renderMockData() {
            document.getElementById('updateTime').textContent = '演示模式';
            document.getElementById('marketStatus').textContent = '模拟数据';
            document.getElementById('limitUpCount').textContent = '36';
            document.getElementById('limitDownCount').textContent = '8';
            document.getElementById('upDownRatio').textContent = '4.5';
            document.getElementById('sentiment').textContent = '偏强';

            document.getElementById('indicesGrid').innerHTML = `
                <div class="index-card">
                    <div><div class="index-name">上证指数</div><div class="index-price">3068.56</div></div>
                    <div class="index-change up">+0.82%</div>
                </div>
                <div class="index-card">
                    <div><div class="index-name">深证成指</div><div class="index-price">9856.23</div></div>
                    <div class="index-change up">+1.15%</div>
                </div>
                <div class="index-card">
                    <div><div class="index-name">创业板指</div><div class="index-price">1988.45</div></div>
                    <div class="index-change down">-0.36%</div>
                </div>
            `;

            document.getElementById('sectorsPanel').innerHTML = `
                <div class="sector-item">
                    <div class="sector-rank top1">1</div>
                    <div class="sector-info">
                        <div class="sector-name">AI/人工智能</div>
                        <div class="sector-meta">8只涨停 | 成交 23.5亿</div>
                    </div>
                </div>
                <div class="sector-item">
                    <div class="sector-rank top2">2</div>
                    <div class="sector-info">
                        <div class="sector-name">医药</div>
                        <div class="sector-meta">6只涨停 | 成交 18.2亿</div>
                    </div>
                </div>
                <div class="sector-item">
                    <div class="sector-rank top3">3</div>
                    <div class="sector-info">
                        <div class="sector-name">数字经济</div>
                        <div class="sector-meta">5只涨停 | 成交 12.8亿</div>
                    </div>
                </div>
                <div class="sector-item">
                    <div class="sector-rank">4</div>
                    <div class="sector-info">
                        <div class="sector-name">芯片半导体</div>
                        <div class="sector-meta">4只涨停 | 成交 9.6亿</div>
                    </div>
                </div>
                <div class="sector-item">
                    <div class="sector-rank">5</div>
                    <div class="sector-info">
                        <div class="sector-name">新能源车</div>
                        <div class="sector-meta">3只涨停 | 成交 6.4亿</div>
                    </div>
                </div>
            `;
