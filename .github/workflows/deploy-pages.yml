name: Deploy to GitHub Pages

on:
  schedule:
    # 每10分钟更新网页数据 (交易时段 09:25-15:00)
    - cron: '25,35,45,55 1 * * 1-5'  # 09:25-14:55
    - cron: '5,15,25,35,45 7 * * 1-5'  # 15:05-16:45
  workflow_dispatch:
    inputs:
      force:
        description: '强制更新'
        required: false
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write

    steps:
      # 1. 检出代码
      - uses: actions/checkout@v4

      # 2. 设置Python
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # 3. 安装依赖
      - name: Install dependencies
        run: |
          cd a_stock_monitor
          pip install -r requirements.txt -q

      # 4. 生成实时数据
      - name: Generate realtime data
        run: python a_stock_monitor/monitor_v2.py data
        env:
          BARK_URL: ${{ secrets.BARK_URL }}
          SERVERCHAN_KEY: ${{ secrets.SERVERCHAN_KEY }}

      # 5. 复制数据到web目录
      - name: Copy data to web
        run: |
          mkdir -p docs/data
          cp a_stock_monitor/data/realtime.json docs/data/
          # 复制网页文件
          cp a_stock_monitor/web/index.html docs/index.html

      # 6. 配置GitHub Pages
      - name: Configure GitHub Pages
        uses: actions/configure-pages@v4

      # 7. 上传artifact
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: 'docs'

      # 8. 部署
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
